version: '3.9'

services:
  web:
    build: .
    expose:
      - "8000"      # 컨테이너 내부에서만 사용 (호스트에 직접 노출 X)
    container_name: django_app
    command: gunicorn Finalproject.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env         # 네가 이미 만든 .env 그대로 사용
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_emergency
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nginx:
    image: nginx:latest
    container_name: backend_nginx
    depends_on:
      - web
    ports:
      - "80:80"      # 백엔드 EC2의 80번 → Nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles

volumes:
  postgres_data:
  static_volume:
