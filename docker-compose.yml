version: '3.9'

services:
  web:
    build: .
    expose:
      - "8000"
    container_name: django_app
    command: gunicorn Finalproject.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    depends_on:
      - db

  cron:
    build: .
    container_name: django_cron
    command: >
      sh -c "
      while true; do
        echo 'Running scheduled tasks...';
        python manage.py fetch_all_data;
        sleep 300;
      done
      "
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_emergency
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nginx:
    image: nginx:latest
    container_name: backend_nginx
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles

volumes:
  postgres_data:
  static_volume: